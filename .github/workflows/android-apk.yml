# Builds the Android APK on GitHub's runners (Java + Android SDK preinstalled) so the
# owner never needs a local Android Studio install (deploy/ANDROID.md documents the
# local route as the alternative).
#
# Usage: GitHub → Actions → "Android APK" → Run workflow → enter your VPS URL
# (e.g. https://eten.example.nl) → download the "hello-picnic-apk" artifact from the
# run and sideload app-debug.apk on the phones.
#
# Debug-signed on purpose: fine for family sideloading, zero keystore management, and
# because the shell loads the VPS URL the APK almost never needs rebuilding — app
# updates ship server-side.
name: Android APK

on:
  workflow_dispatch:
    inputs:
      server_url:
        description: 'Publieke HTTPS-URL van je VPS-deployment (bijv. https://eten.jouwdomein.nl)'
        required: true
        type: string

jobs:
  apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
      - name: Sync Capacitor with the VPS URL
        env:
          CAP_SERVER_URL: ${{ inputs.server_url }}
        run: |
          mkdir -p cap-webdir-unused
          npx cap sync android
      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hello-picnic-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
