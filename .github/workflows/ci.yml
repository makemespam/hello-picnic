name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hellopicnic
          POSTGRES_PASSWORD: hellopicnic
          POSTGRES_DB: hellopicnic
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U hellopicnic"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://hellopicnic:hellopicnic@localhost:5432/hellopicnic
      FAKE_AI: '1'
      TZ: Europe/Amsterdam
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - name: Run migrations (skipped while no migrations exist yet)
        run: |
          if [ -d src/server/db/migrations ] && [ -n "$(ls -A src/server/db/migrations/*.sql 2>/dev/null)" ]; then
            npm run db:migrate
          else
            echo "No migrations yet — skipping"
          fi
      - run: npm run test:ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - run: npm run e2e
      # Optional Lighthouse gate (docs/workpackages/WP-14-android-parity-release.md §6):
      # performance budget (>=80) on Login/Vandaag/Weekplan/Recepten + a manifest-based
      # installability check (Lighthouse's own `pwa` category was removed upstream in
      # v10+ — see scripts/lighthouse-check.ts's header comment). Reuses the session
      # cookie e2e/.auth/user.json just produced above and the Chromium
      # `playwright install` just fetched. continue-on-error: this must never block a
      # merge — there's no guarantee every environment this CI runs in can launch
      # headless Chrome the same way twice in a row.
      - name: Build for Lighthouse
        run: npm run build
        continue-on-error: true
      - name: Lighthouse (optional, non-blocking)
        continue-on-error: true
        run: |
          npm run start &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/health && break
            sleep 2
          done
          npm run lighthouse
          kill $SERVER_PID
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: e2e/__screenshots__/
          if-no-files-found: ignore
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

  docker:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
