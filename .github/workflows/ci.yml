name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hellopicnic
          POSTGRES_PASSWORD: hellopicnic
          POSTGRES_DB: hellopicnic
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U hellopicnic"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://hellopicnic:hellopicnic@localhost:5432/hellopicnic
      FAKE_AI: '1'
      TZ: Europe/Amsterdam
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - name: Run migrations (skipped while no migrations exist yet)
        run: |
          if [ -d src/server/db/migrations ] && [ -n "$(ls -A src/server/db/migrations/*.sql 2>/dev/null)" ]; then
            npm run db:migrate
          else
            echo "No migrations yet — skipping"
          fi
      - run: npm run test:ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - run: npm run e2e
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: e2e/__screenshots__/
          if-no-files-found: ignore
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

  docker:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
