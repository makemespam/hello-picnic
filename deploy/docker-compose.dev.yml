# Local development database: docker compose -f deploy/docker-compose.dev.yml up -d
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: hellopicnic
      POSTGRES_PASSWORD: hellopicnic
      POSTGRES_DB: hellopicnic
    ports:
      - '5432:5432'
    volumes:
      - hp_pg_dev:/var/lib/postgresql/data

volumes:
  hp_pg_dev:
