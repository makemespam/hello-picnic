# Production compose for the Leaseweb VPS (docs/ARCHITECTURE.md §8).
# Postgres is shared VPS infrastructure on the external `shared_infra` network —
# see README.md in this directory for the one-time role/database setup.
services:
  app:
    image: ghcr.io/makemespam/hello-picnic:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - hp_data:/data
    networks:
      - default
      - shared_infra
      # Same docker network as the existing vibe-caddy-1 reverse proxy, so its
      # `reverse_proxy deploy-app-1:3000` site block keeps resolving after restarts.
      - vibe_default

  # One-off jobs (migraties, gebruikersbeheer): docker compose --profile tools run --rm tools <cmd>
  tools:
    build:
      context: ..
      target: tools
    profiles: ['tools']
    env_file: .env
    networks:
      - shared_infra

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    networks:
      - default

volumes:
  hp_data:
  caddy_data:

networks:
  shared_infra:
    external: true
  vibe_default:
    external: true
